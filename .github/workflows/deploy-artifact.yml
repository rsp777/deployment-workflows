name: Deploy Service to Linux Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Target Linux Server / Environment'
        required: true
        type: choice
        options:
          - 'inventory-wms'
          - 'staging-server-01'
          - 'development-server-01'
      application:
        description: 'Select Spring Boot Application to Deploy'
        required: true
        type: choice
        options:
          - 'inventory-management-app'
          - 'payment-service'
          - 'inventory-service'
      version:
        description: 'Target Application Version (Type concrete version or leave as "latest" to fetch most recent)'
        required: true
        type: string
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

        # 1. Set up JDK SECOND
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          
        # 2. Delete the file
      - name: Remove existing settings.xml
        run: rm -f $HOME/.m2/settings.xml

        # 3. Setup Maven settings FIRST
      - name: Setup Maven settings
        uses: s4u/maven-settings-action@v4.0.0
        with:
          override: true
          servers: |
            [{"id":"github","username":"${{ secrets.USERNAME }}","password":"${{ secrets.PASSWORD }}"}]
          repositories: |
            [
             {"id":"github","name":"inventory-management-app","url":"https://maven.pkg.github.com/rsp777/inventory-management-app"}]    

      # 3. Handle Mapping & Fetching Remote Versions
      - name: Set Environment Variables & Resolve Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.environment }}" = "inventory-wms" ]; then
            echo "SERVER_HOST=${{ secrets.PROD_SERVER_IP }}" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" = "staging-server-01" ]; then
            echo "SERVER_HOST=${{ secrets.STAGING_SERVER_IP }}" >> $GITHUB_ENV
          else
            echo "SERVER_HOST=${{ secrets.DEV_SERVER_IP }}" >> $GITHUB_ENV
          fi
          
          APP_NAME="${{ github.event.inputs.application }}"
          INPUT_VERSION="${{ github.event.inputs.version }}"
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          
          if [ "$INPUT_VERSION" = "latest" ]; then
            echo "Fetching the latest package version via GitHub Packages API..."
            PACKAGE_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://maven.pkg.github.com/rsp777//com.pawar.inventory.app.$APP_NAME/versions" \
              | jq -r '..name // "1.0.0-SNAPSHOT"')
              
            echo "Resolved latest version: $PACKAGE_VERSION"
            echo "APP_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          else
            echo "Using manual input version: $INPUT_VERSION"
            echo "APP_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
          fi

      # 4. Download Target JAR from GitHub Package Registry
      - name: Download Artifact from Maven Registry
        run: |
          mkdir -p target
          # Uses explicit settings routing file flag (-s) just like your working setup
          # mvn dependency:get \
          #   -DrepoUrl=https://maven.pkg.github.com/rsp777/${{ env.APP_NAME }} \
          #   -Dartifact=com.pawar.inventory.app:${{ env.APP_NAME }}:${{ env.APP_VERSION }}:jar \
          #   -Dtransitive=false \
          #   -Ddest=./target/${{ env.APP_NAME }}.jar \
          #   -s $HOME/.m2/settings.xml
          mvn dependency:copy -Dartifact='com.pawar.inventory.app':${{ env.APP_NAME }}:${{ env.APP_VERSION }} -DrepoUrl=https://maven.pkg.github.com/rsp777/inventory-management-app -DrepoId=github \
          -Ddest=./target/${{ env.APP_NAME }}.jar -s $HOME/.m2/settings.xml

      # 5. Connect runner container as a temporary secure Tailscale network node
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:sop
      
      # 6. Copy JAR to Linux Server via SCP
      - name: Copy JAR to Linux Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "target/dependency/${{ env.APP_NAME }}-${{ env.APP_VERSION }}.jar"
          target: "/tmp"
          strip_components: 1

      # 7. Deploy the Artifact to Remote Linux Server
      - name: Deploy the Artifact to Remote Linux Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "Deploying ${{ env.APP_NAME }}:${{ env.APP_VERSION }} to ${{ env.SERVER_HOST }}"                        
            sudo mv /tmp/${{ env.APP_NAME }}.jar ~/apps/inventory-wms/artifacts/${{ env.APP_NAME }}.jar
            sudo rm -f /tmp/${{ env.APP_NAME }}.jar
            
            echo "Restarting service: ${{ env.APP_NAME }}"
            chmod +x ~/apps/inventory-wms/scripts/stop.sh ~/apps/inventory-wms/scripts/start.sh
            ~/apps/inventory-wms/scripts/stop.sh ${{ env.APP_NAME }}
            ~/apps/inventory-wms/scripts/start.sh ${{ env.APP_NAME }}
            echo "Restarted service: ${{ env.APP_NAME }}"
