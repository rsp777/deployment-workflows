name: Trigger Start/Stop Application on Target Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Target Linux Server / Environment'
        required: true
        type: choice
        options:
          - 'inventory-wms'
          - 'staging-server-01'
          - 'development-server-01'
      application:
        description: 'Select Spring Boot Application to Start/Stop'
        required: true
        type: choice
        options:
          - 'inventory-management-app'
          - 'payment-service'
          - 'inventory-service'
      command:
        description: 'Start/Stop Command'
        required: true
        type: choice
        options:
          - 'start'
          - 'stop'

jobs:
  start-stop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. SETTING ENV VARIABLES
      - name: Set Environment Variables & Resolve Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.environment }}" = "inventory-wms" ]; then
            echo "SERVER_HOST=${{ secrets.PROD_SERVER_IP }}" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment }}" = "staging-server-01" ]; then
            echo "SERVER_HOST=${{ secrets.STAGING_SERVER_IP }}" >> $GITHUB_ENV
          else
            echo "SERVER_HOST=${{ secrets.DEV_SERVER_IP }}" >> $GITHUB_ENV
          fi

          APP_NAME="${{ github.event.inputs.application }}"
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV

          if [ "${{ github.event.inputs.command }}" = "start" ]; then
            echo "COMMAND=${{ secrets.START_CMD }}" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.command }}" = "stop" ]; then
            echo "COMMAND=${{ secrets.STOP_CMD }}" >> $GITHUB_ENV
          fi

      # Debug: confirm runtime env vars exist
      - name: Dump resolved env vars
        run: |
          echo "SERVER_HOST=$SERVER_HOST"
          echo "APP_NAME=$APP_NAME"
          echo "COMMAND=$COMMAND"

      # 2. Connect to Tailscale network (no script input)
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:sop

      - name: Wait for Tailscale to be ready
        run: |
          # simple wait/check — make this more robust if needed
          for i in {1..10}; do
            tailscale status && break
            sleep 1
          done
          tailscale status

      # 3. Run the start/stop command on the target machine using SSH from the runner
      - name: Run Start/Stop on remote host via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem
          echo "Running: $COMMAND $APP_NAME on $SERVER_HOST"
          ssh -o StrictHostKeyChecking=no -i key.pem "${{ secrets.SERVER_USER }}@$SERVER_HOST" "$COMMAND $APP_NAME"
          rm -f key.pem
