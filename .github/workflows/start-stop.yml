name: Trigger Start/Stop Application on Target Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Target Linux Server / Environment'
        required: true
        type: choice
        options:
          - 'inventory-wms'
          - 'auth-wms'
          - 'development-server-01'
      application:
        description: 'Select Spring Boot Application to Start/Stop'
        required: true
        type: choice
        options:
          - 'inventory-management-app'
          - 'inventory-management-system'
          - 'register-service'
          - 'login-service'
      command:
        description: 'Start/Stop Command'
        required: true
        type: choice
        options:
          - 'start'
          - 'stop'

jobs:
  start-stop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. SETTING ENV VARIABLES & RESOLVING DYNAMIC PATHS
      - name: Set Environment Variables & Resolve Variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Capture Inputs
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          APP_NAME="${{ github.event.inputs.application }}"
          CMD_TYPE="${{ github.event.inputs.command }}"
          
          # Resolve Server IP and SSH Key Prefix based on environment
          if [ "$ENVIRONMENT" = "inventory-wms" ]; then
            echo "SERVER_HOST=${{ secrets.INVENTORY_WMS_SERVER_ID }}" >> $GITHUB_ENV
            echo "SECRET_PREFIX=INVENTORY_WMS" >> $GITHUB_ENV
          elif [ "$ENVIRONMENT" = "auth-wms" ]; then
            echo "SERVER_HOST=${{ secrets.AUTH_WMS_SERVER_IP }}" >> $GITHUB_ENV
            echo "SECRET_PREFIX=AUTH_WMS" >> $GITHUB_ENV
          else
            echo "SERVER_HOST=${{ secrets.DEV_SERVER_IP }}" >> $GITHUB_ENV
            echo "SECRET_PREFIX=DEV" >> $GITHUB_ENV
          fi

          # Save App Name and Environment
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${ENVIRONMENT}" >> $GITHUB_ENV

          # Construct the Dynamic Command Path
          # Example output: ./apps/inventory-wms/scripts/start.sh
          DYNAMIC_CMD="./apps/${ENVIRONMENT}/scripts/${CMD_TYPE}.sh"
          echo "COMMAND=${DYNAMIC_CMD}" >> $GITHUB_ENV

      # Debug: confirm runtime env vars exist (Safely prints non-sensitive data)
      - name: Dump resolved env vars
        run: |
          echo "SERVER_HOST=$SERVER_HOST"
          echo "APP_NAME=$APP_NAME"
          echo "COMMAND=$COMMAND"
          echo "SECRET_PREFIX=$SECRET_PREFIX"
          echo "Looking for SSH Key Secret:      ${{ env.SECRET_PREFIX }}_SSH_KEY"
          echo "Looking for Passphrase Secret:   ${{ env.SECRET_PREFIX }}_SSH_PASSPHRASE"

      # 2. Connect to Tailscale network
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:sop

      - name: Wait for Tailscale to be ready
        run: |
          # simple wait/check — make this more robust if needed
          for i in {1..10}; do
            tailscale status && break
            sleep 1
          done
          tailscale status
      
      # 3. Run the start/stop command on the target machine using SSH
      - name: Trigger Start/Stop
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          # Dynamically fetches PROD_SSH_KEY, AUTH_SSH_KEY, or DEV_SSH_KEY
          key: ${{ secrets[format('{0}_SSH_KEY', env.SECRET_PREFIX)] }}
          passphrase: ${{ secrets[format('{0}_SSH_PASSPHRASE', env.SECRET_PREFIX)] }} #${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: 22
          script: |
            # Evaluates to e.g., ./apps/inventory-wms/scripts/start.sh inventory-management-app
            echo ${{env.SECRET_PREFIX}}
            ${{ env.COMMAND }} ${{ env.APP_NAME }}
            echo "Successfully triggered ${{ github.event.inputs.command }} for ${{ env.APP_NAME }} on ${{ env.SERVER_HOST }}"
